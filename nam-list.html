<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>নামের তালিকা - জয় গুরু</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #fef5e8 0%, #f0e6d2 100%);
            font-family: 'Hind Siliguri', 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 24px;
        }
        .header {
            background: linear-gradient(115deg, #1a3c2c, #2a5a3a);
            margin: -24px -24px 24px -24px;
            padding: 20px 24px;
            color: #ffefc0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 1.6rem; }
        .header h1 span { animation: pulse 2s infinite; display: inline-block; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-primary { background: #d4a373; color: #2c2c2c; }
        .btn-primary:hover { background: #e0b88a; transform: scale(0.98); }
        .btn-success { background: #2d6a4f; color: white; }
        .btn-success:hover { background: #3a8a62; }
        .btn-warning { background: #e9b35f; color: #2c2c2c; }
        .btn-danger { background: #c23d2e; color: white; }
        .btn-info { background: #2c5a8c; color: white; }
        
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #e2d4ba;
        }
        .search-box input {
            padding: 10px;
            border: none;
            outline: none;
            width: 250px;
            font-family: inherit;
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 800px;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }
        th {
            background: #e8f0e0;
            color: #2c5a2e;
            position: sticky;
            top: 0;
        }
        tr:hover { background: #f9f5e8; }
        
        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-btns button {
            padding: 5px 12px;
            font-size: 0.75rem;
            border-radius: 30px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 28px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; color: #2c5a2e; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-family: inherit;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        
        .status-msg {
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: none;
        }
        .status-success { background: #d0ffd0; color: green; display: block; }
        .status-error { background: #ffe0e0; color: red; display: block; }
        .status-loading { background: #fff0d0; color: #c97e2c; display: block; }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #2c5a2e;
        }
        
        @media print {
            .no-print { display: none; }
            .container { box-shadow: none; padding: 0; }
            body { padding: 0; background: white; }
            .table-wrapper { overflow-x: visible; }
        }
        
        @media (max-width: 768px) {
            th, td { font-size: 0.7rem; padding: 8px 5px; }
            .btn { padding: 6px 12px; font-size: 0.8rem; }
            .container { padding: 16px; }
            .header { margin: -16px -16px 16px -16px; padding: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 <span>জয় গুরু</span> - নামের তালিকা</h1>
        <div>
            <a href="index.html" class="btn btn-primary no-print">🏠 ফর্মে ফিরুন</a>
        </div>
    </div>
    
    <div id="statusMsg" class="status-msg"></div>
    
    <div class="toolbar no-print">
        <div class="search-box">
            🔍 <input type="text" id="searchInput" placeholder="নাম, জেলা, মোবাইল দিয়ে খুঁজুন..." onkeyup="searchData()">
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-success" onclick="openAddModal()">➕ নতুন নাম যোগ করুন</button>
            <button class="btn btn-info" onclick="exportToCSV()">📎 CSV ডাউনলোড</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ প্রিন্ট করুন</button>
            <button class="btn btn-warning" onclick="refreshData()">🔄 রিফ্রেশ</button>
        </div>
    </div>
    
    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>#</th><th>টাইমস্ট্যাম্প</th><th>পিতার নাম</th><th>মাতার নাম</th>
                    <th>মোবাইল</th><th>পিতামহ</th><th>প্রপিতামহ</th><th>জন্ম তারিখ</th>
                    <th>জন্ম সময়</th><th>লিঙ্গ</th><th>গ্রাম</th><th>জেলা</th><th>উপজেলা</th>
                    <th class="no-print">একশন</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="14" class="loading-spinner">⏳ লোড হচ্ছে...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- মডাল ফর্ম: যোগ/এডিট -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">নতুন নাম যোগ করুন</h3>
        <input type="hidden" id="editRowId">
        <input type="text" id="editPitaName" placeholder="পিতার নাম">
        <input type="text" id="editMataName" placeholder="মাতার নাম">
        <input type="tel" id="editMobile" placeholder="মোবাইল নাম্বার">
        <input type="text" id="editPitamaha" placeholder="পিতামহ">
        <input type="text" id="editPrapitamaha" placeholder="প্রপিতামহ">
        <input type="date" id="editJanmaTarikh">
        <input type="time" id="editJanmaSomoy">
        <select id="editGender">
            <option value="ছেলে">ছেলে</option>
            <option value="মেয়ে">মেয়ে</option>
            <option value="অন্যান্য">অন্যান্য</option>
        </select>
        <input type="text" id="editGram" placeholder="গ্রাম">
        <input type="text" id="editJela" placeholder="জেলা">
        <input type="text" id="editUpazila" placeholder="উপজেলা">
        <div class="modal-buttons">
            <button class="btn btn-success" onclick="saveData()">💾 সংরক্ষণ</button>
            <button class="btn btn-danger" onclick="closeModal()">❌ বাতিল</button>
        </div>
    </div>
</div>

<script>
// ============================================
// গ্লোবাল ভেরিয়েবল
// ============================================
let allData = [];
let currentEditIndex = -1;
let filteredData = [];

// ============================================
// আপনার Google Apps Script URL এখানে দিন
// ============================================
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzEOkpjuI9-BNZgHl8Lz-sV5eFjqnBVV2pifyXvOwgvvchMrFWSFCgg0C61QvmO5dqo/exec";

// ============================================
// ডাটা লোড (GET)
// ============================================
async function loadData() {
    try {
        showMessage("⏳ ডাটা লোড হচ্ছে...", "loading");
        
        const response = await fetch(`${SHEET_API_URL}?read=1`);
        const result = await response.json();
        
        console.log("API Response:", result);
        
        if(result.status === "success" && result.data) {
            allData = result.data.filter(row => row[0] && row[0].toString().trim() !== "");
            filteredData = [...allData];
            renderTable();
            showMessage(`✅ ${allData.length} টি ডাটা সফলভাবে লোড হয়েছে`, "success");
        } else {
            allData = [];
            filteredData = [];
            renderTable();
            showMessage("📭 কোনো ডাটা নেই", "error");
        }
    } catch(e) {
        console.error("Load Error:", e);
        showMessage("❌ ডাটা লোড করতে সমস্যা: " + e.message, "error");
        allData = [];
        filteredData = [];
        renderTable();
    }
}

// ============================================
// টেবিল রেন্ডার
// ============================================
function renderTable() {
    const tbody = document.getElementById("tableBody");
    
    if(!filteredData || filteredData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="14" style="text-align:center; padding:40px;">📭 কোনো ডাটা নেই</td></tr>`;
        return;
    }
    
    tbody.innerHTML = filteredData.map((row, idx) => `
        <tr>
            <td>${idx + 1}</td>
            <td>${row[0] || ''}</td>
            <td>${row[1] || ''}</td>
            <td>${row[2] || ''}</td>
            <td>${row[3] || ''}</td>
            <td>${row[4] || ''}</td>
            <td>${row[5] || ''}</td>
            <td>${row[6] || ''}</td>
            <td>${row[7] || ''}</td>
            <td>${row[8] || ''}</td>
            <td>${row[9] || ''}</td>
            <td>${row[10] || ''}</td>
            <td>${row[11] || ''}</td>
            <td class="no-print">
                <div class="action-btns">
                    <button class="btn btn-warning" onclick="editRow(${allData.indexOf(row)})">✏️ এডিট</button>
                    <button class="btn btn-danger" onclick="deleteRow(${allData.indexOf(row)})">🗑️ ডিলিট</button>
                </div>
             </td>
        <table>
    `).join('');
}

// ============================================
// সার্চ ফাংশন
// ============================================
function searchData() {
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();
    if(!searchTerm) {
        filteredData = [...allData];
    } else {
        filteredData = allData.filter(row => 
            JSON.stringify(row).toLowerCase().includes(searchTerm)
        );
    }
    renderTable();
}

// ============================================
// মেসেজ দেখানো
// ============================================
function showMessage(msg, type) {
    const el = document.getElementById("statusMsg");
    el.innerText = msg;
    el.className = `status-msg status-${type}`;
    setTimeout(() => {
        if(el.className.includes(`status-${type}`)) {
            el.style.display = "none";
        }
    }, 4000);
}

// ============================================
// রিফ্রেশ
// ============================================
function refreshData() {
    loadData();
}

// ============================================
// মডাল ফাংশন
// ============================================
function openAddModal() {
    currentEditIndex = -1;
    document.getElementById("modalTitle").innerText = "➕ নতুন নাম যোগ করুন";
    clearModalForm();
    openModal();
}

function editRow(index) {
    currentEditIndex = index;
    const row = allData[index];
    document.getElementById("modalTitle").innerText = "✏️ তথ্য এডিট করুন";
    
    document.getElementById("editPitaName").value = row[1] || "";
    document.getElementById("editMataName").value = row[2] || "";
    document.getElementById("editMobile").value = row[3] || "";
    document.getElementById("editPitamaha").value = row[4] || "";
    document.getElementById("editPrapitamaha").value = row[5] || "";
    document.getElementById("editJanmaTarikh").value = row[6] || "";
    document.getElementById("editJanmaSomoy").value = row[7] || "";
    document.getElementById("editGender").value = row[8] || "ছেলে";
    document.getElementById("editGram").value = row[9] || "";
    document.getElementById("editJela").value = row[10] || "";
    document.getElementById("editUpazila").value = row[11] || "";
    
    openModal();
}

function deleteRow(index) {
    if(confirm("⚠️ আপনি কি এই ডাটা ডিলিট করতে চান? একবার ডিলিট করলে পুনরুদ্ধার করা যাবে না।")) {
        const rowToDelete = allData[index];
        // ডাটা মুছে ফেলা (লোকালি)
        allData.splice(index, 1);
        filteredData = [...allData];
        renderTable();
        showMessage("🗑️ ডাটা ডিলিট হয়েছে", "success");
        
        // নোট: আসল Google Sheet থেকে ডিলিট করতে চাইলে এপিআই কল করতে হবে
        // সহজ সমাধান: ব্যবহারকারীকে ম্যানুয়ালি শীট থেকে ডিলিট করতে বলুন
    }
}

function saveData() {
    const newData = [
        new Date().toString(),
        document.getElementById("editPitaName").value,
        document.getElementById("editMataName").value,
        document.getElementById("editMobile").value,
        document.getElementById("editPitamaha").value,
        document.getElementById("editPrapitamaha").value,
        document.getElementById("editJanmaTarikh").value,
        document.getElementById("editJanmaSomoy").value,
        document.getElementById("editGender").value,
        document.getElementById("editGram").value,
        document.getElementById("editJela").value,
        document.getElementById("editUpazila").value
    ];
    
    if(currentEditIndex === -1) {
        // নতুন যোগ
        allData.unshift(newData);
        showMessage("✅ নতুন তথ্য যোগ হয়েছে", "success");
    } else {
        // এডিট
        allData[currentEditIndex] = newData;
        showMessage("✅ তথ্য আপডেট হয়েছে", "success");
    }
    
    filteredData = [...allData];
    renderTable();
    closeModal();
    
    // নোট: Google Sheet-এ সেভ করার জন্য API কল প্রয়োজন
    // বর্তমানে লোকালি সেভ হচ্ছে
}

function openModal() {
    document.getElementById("editModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("editModal").style.display = "none";
    clearModalForm();
}

function clearModalForm() {
    document.getElementById("editPitaName").value = "";
    document.getElementById("editMataName").value = "";
    document.getElementById("editMobile").value = "";
    document.getElementById("editPitamaha").value = "";
    document.getElementById("editPrapitamaha").value = "";
    document.getElementById("editJanmaTarikh").value = "";
    document.getElementById("editJanmaSomoy").value = "";
    document.getElementById("editGender").value = "ছেলে";
    document.getElementById("editGram").value = "";
    document.getElementById("editJela").value = "";
    document.getElementById("editUpazila").value = "";
}

// ============================================
// CSV এক্সপোর্ট
// ============================================
function exportToCSV() {
    if(!allData.length) {
        showMessage("❌ কোনো ডাটা নেই", "error");
        return;
    }
    
    const headers = ["টাইমস্ট্যাম্প", "পিতার নাম", "মাতার নাম", "মোবাইল নাম্বার", "পিতামহ", "প্রপিতামহ", "জন্ম তারিখ", "জন্ম সময়", "লিঙ্গ", "গ্রাম", "জেলা", "উপজেলা"];
    const csvRows = [headers];
    
    allData.forEach(row => {
        csvRows.push(row.map(cell => `"${cell || ''}"`));
    });
    
    const csvContent = csvRows.map(row => row.join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute("download", "jay_guru_nam_list.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showMessage("📎 CSV ফাইল ডাউনলোড শুরু হয়েছে", "success");
}

// ============================================
// পেজ লোডে ডাটা লোড
// ============================================
loadData();
</script>
</body>
</html>
