<script>
// ============================================
// গ্লোবাল ভেরিয়েবল
// ============================================
let allData = [];
let filteredData = [];

// ============================================
// আপনার নতুন URL এখানে দিন
// ============================================
const SHEET_API_URL = "https://script.google.com/macros/s/YOUR_NEW_URL/exec";

// ============================================
// ডাটা লোড (GET) - সঠিক সংস্করণ
// ============================================
async function loadData() {
    const tbody = document.getElementById("tableBody");
    const msgDiv = document.getElementById("statusMsg");
    
    try {
        tbody.innerHTML = `<tr><td colspan="14" style="text-align:center; padding:40px;">⏳ লোড হচ্ছে...</td></tr>`;
        
        const response = await fetch(`${SHEET_API_URL}`, {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        });
        
        const result = await response.json();
        console.log("API Response:", result);
        
        if(result.status === "success") {
            allData = result.data || [];
            filteredData = [...allData];
            renderTable();
            
            if(allData.length === 0) {
                showMessage("📭 এখনো কোনো ডাটা নেই। ফর্ম থেকে ডাটা জমা দিন।", "error");
            } else {
                showMessage(`✅ ${allData.length} টি ডাটা সফলভাবে লোড হয়েছে`, "success");
            }
        } else {
            throw new Error(result.message || "ডাটা লোডে সমস্যা");
        }
        
    } catch(e) {
        console.error("Load Error:", e);
        showMessage("❌ ডাটা লোড করতে সমস্যা: " + e.message, "error");
        tbody.innerHTML = `<tr><td colspan="14" style="text-align:center; padding:40px;">❌ ডাটা লোড হয়নি। API URL চেক করুন।</td></tr>`;
    }
}

// ============================================
// টেবিল রেন্ডার
// ============================================
function renderTable() {
    const tbody = document.getElementById("tableBody");
    
    if(!filteredData || filteredData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="14" style="text-align:center; padding:40px;">📭 কোনো ডাটা নেই</td></tr>`;
        return;
    }
    
    tbody.innerHTML = filteredData.map((row, idx) => `
        <tr>
            <td>${idx + 1}</td>
            <td>${row[0] || ''}</td>
            <td>${row[1] || ''}</td>
            <td>${row[2] || ''}</td>
            <td>${row[3] || ''}</td>
            <td>${row[4] || ''}</td>
            <td>${row[5] || ''}</td>
            <td>${row[6] || ''}</td>
            <td>${row[7] || ''}</td>
            <td>${row[8] || ''}</td>
            <td>${row[9] || ''}</td>
            <td>${row[10] || ''}</td>
            <td>${row[11] || ''}</td>
            <td class="no-print">
                <div class="action-btns">
                    <button class="btn btn-warning" onclick="editRow(${allData.indexOf(row)})">✏️ এডিট</button>
                    <button class="btn btn-danger" onclick="deleteRow(${allData.indexOf(row)})">🗑️ ডিলিট</button>
                </div>
            </td>
        </tr>
    `).join('');
}

// ============================================
// সার্চ ফাংশন
// ============================================
function searchData() {
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();
    if(!searchTerm) {
        filteredData = [...allData];
    } else {
        filteredData = allData.filter(row => 
            JSON.stringify(row).toLowerCase().includes(searchTerm)
        );
    }
    renderTable();
}

// ============================================
// মেসেজ দেখানো
// ============================================
function showMessage(msg, type) {
    const el = document.getElementById("statusMsg");
    el.innerText = msg;
    el.className = `status-msg status-${type}`;
    setTimeout(() => {
        el.style.display = "none";
    }, 4000);
}

// ============================================
// রিফ্রেশ
// ============================================
function refreshData() {
    loadData();
}

// ============================================
// CSV এক্সপোর্ট
// ============================================
function exportToCSV() {
    if(!allData.length) {
        showMessage("❌ কোনো ডাটা নেই", "error");
        return;
    }
    
    const headers = ["টাইমস্ট্যাম্প", "পিতার নাম", "মাতার নাম", "মোবাইল নাম্বার", "পিতামহ", "প্রপিতামহ", "জন্ম তারিখ", "জন্ম সময়", "লিঙ্গ", "গ্রাম", "জেলা", "উপজেলা"];
    const csvRows = [headers];
    
    allData.forEach(row => {
        csvRows.push(row.map(cell => `"${(cell || '').toString().replace(/"/g, '""')}"`));
    });
    
    const csvContent = csvRows.map(row => row.join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute("download", "jay_guru_nam_list.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showMessage("📎 CSV ফাইল ডাউনলোড শুরু হয়েছে", "success");
}

// এডিট/ডিলিট ফাংশন (লোকাল)
function editRow(index) {
    alert("এডিট ফিচার: আপনি Google Sheet এ গিয়ে ডাটা এডিট করতে পারেন।\nশীট খুলুন এবং সারি এডিট করুন।");
}

function deleteRow(index) {
    alert("ডিলিট ফিচার: আপনি Google Sheet এ গিয়ে ডাটা ডিলিট করতে পারেন।\nশীট খুলুন এবং সারি ডিলিট করুন।");
}

// পেজ লোডে ডাটা লোড
loadData();
</script>
