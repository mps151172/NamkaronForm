<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>নামের তালিকা - জয় গুরু</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #fef5e8 0%, #f0e6d2 100%);
            font-family: 'Hind Siliguri', 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 24px;
        }
        .header {
            background: linear-gradient(115deg, #1a3c2c, #2a5a3a);
            margin: -24px -24px 24px -24px;
            padding: 20px 24px;
            color: #ffefc0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 1.6rem; }
        .header h1 span { animation: pulse 2s infinite; display: inline-block; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-primary { background: #d4a373; color: #2c2c2c; }
        .btn-primary:hover { background: #e0b88a; transform: scale(0.98); }
        .btn-success { background: #2d6a4f; color: white; }
        .btn-warning { background: #e9b35f; color: #2c2c2c; }
        .btn-danger { background: #c23d2e; color: white; }
        .btn-info { background: #2c5a8c; color: white; }
        
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #e2d4ba;
        }
        .search-box input {
            padding: 10px;
            border: none;
            outline: none;
            width: 250px;
            font-family: inherit;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }
        th {
            background: #e8f0e0;
            color: #2c5a2e;
            position: sticky;
            top: 0;
        }
        tr:hover { background: #f9f5e8; }
        
        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-btns button {
            padding: 5px 12px;
            font-size: 0.75rem;
            border-radius: 30px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 28px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; color: #2c5a2e; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-family: inherit;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        
        @media (max-width: 768px) {
            th, td { font-size: 0.7rem; padding: 8px 5px; }
            .btn { padding: 6px 12px; font-size: 0.8rem; }
            .container { padding: 16px; }
            .header { margin: -16px -16px 16px -16px; padding: 15px; }
        }
        
        .status-msg {
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: none;
        }
        .status-success { background: #d0ffd0; color: green; display: block; }
        .status-error { background: #ffe0e0; color: red; display: block; }
        
        .print-area { width: 100%; }
        @media print {
            .no-print { display: none; }
            .container { box-shadow: none; padding: 0; }
            body { padding: 0; background: white; }
            .print-area { overflow-x: visible; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 <span>জয় গুরু</span> - নামের তালিকা</h1>
        <div>
            <a href="index.html" class="btn btn-primary no-print">🏠 ফর্মে ফিরুন</a>
        </div>
    </div>
    
    <div id="statusMsg" class="status-msg"></div>
    
    <div class="toolbar no-print">
        <div class="search-box">
            🔍 <input type="text" id="searchInput" placeholder="নাম, জেলা, মোবাইল দিয়ে খুঁজুন...">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-success" onclick="openAddModal()">➕ নতুন নাম যোগ করুন</button>
            <button class="btn btn-info" onclick="exportToCSV()">📎 CSV ডাউনলোড</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ প্রিন্ট করুন</button>
            <button class="btn btn-warning" onclick="refreshData()">🔄 রিফ্রেশ</button>
        </div>
    </div>
    
    <div class="print-area" style="overflow-x: auto;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>#</th><th>টাইমস্ট্যাম্প</th><th>পিতার নাম</th><th>মাতার নাম</th>
                    <th>মোবাইল</th><th>পিতামহ</th><th>প্রপিতামহ</th><th>জন্ম তারিখ</th>
                    <th>জন্ম সময়</th><th>লিঙ্গ</th><th>গ্রাম</th><th>জেলা</th><th>উপজেলা</th>
                    <th class="no-print">একশন</th>
                 </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="14">লোড হচ্ছে...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- মডাল ফর্ম: যোগ/এডিট -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">নতুন নাম যোগ করুন</h3>
        <input type="hidden" id="editRowId">
        <input type="text" id="editPitaName" placeholder="পিতার নাম">
        <input type="text" id="editMataName" placeholder="মাতার নাম">
        <input type="tel" id="editMobile" placeholder="মোবাইল নাম্বার">
        <input type="text" id="editPitamaha" placeholder="পিতামহ">
        <input type="text" id="editPrapitamaha" placeholder="প্রপিতামহ">
        <input type="date" id="editJanmaTarikh">
        <input type="time" id="editJanmaSomoy">
        <select id="editGender"><option value="ছেলে">ছেলে</option><option value="মেয়ে">মেয়ে</option><option value="অন্যান্য">অন্যান্য</option></select>
        <input type="text" id="editGram" placeholder="গ্রাম">
        <select id="editJela"><option value="">জেলা নির্বাচন করুন</option></select>
        <select id="editUpazila"><option value="">উপজেলা নির্বাচন করুন</option></select>
        <div class="modal-buttons">
            <button class="btn btn-primary" onclick="saveData()">সংরক্ষণ</button>
            <button class="btn btn-danger" onclick="closeModal()">বাতিল</button>
        </div>
    </div>
</div>

<script>
// শীট ডাটা সংরক্ষণ (গ্লোবাল ভেরিয়েবল)
let allData = [];
let currentEditIndex = -1;

// Google Sheet Web App URL (আপনার নতুন URL বসান)
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzEOkpjuI9-BNZgHl8Lz-sV5eFjqnBVV2pifyXvOwgvvchMrFWSFCgg0C61QvmO5dqo/exec";

// জেলা ও উপজেলার তালিকা (সংক্ষেপে দিচ্ছি, পুরোটা আগের মতো)
const districtList = ["ঢাকা","চট্টগ্রাম","রাজশাহী","খুলনা","বরিশাল","সিলেট","রংপুর","ময়মনসিংহ","কুমিল্লা","ফেনী","নোয়াখালী","কক্সবাজার","নওগাঁ","পাবনা"];
const upazilaMap = {
    "ঢাকা": ["উত্তরা","তেজগাঁও","মিরপুর","গুলশান"], "চট্টগ্রাম": ["কর্ণফুলী","পটিয়া","রাউজান"], "রাজশাহী": ["বোয়ালিয়া","মতিহার","পুঠিয়া"], "খুলনা": ["খুলনা সদর","দৌলতপুর"]
};

// ডাটা লোড
async function loadData() {
    try {
        const res = await fetch(SHEET_API_URL + "?read=1");
        const data = await res.json();
        if(data.data) allData = data.data;
        else allData = [];
        renderTable();
    } catch(e) {
        showMessage("ডাটা লোড করতে সমস্যা: " + e.message, "error");
        allData = [];
        renderTable();
    }
}

// টেবিল রেন্ডার
function renderTable() {
    const search = document.getElementById("searchInput")?.value.toLowerCase() || "";
    let filtered = allData.filter(row => 
        JSON.stringify(row).toLowerCase().includes(search)
    );
    const tbody = document.getElementById("tableBody");
    if(filtered.length===0) {
        tbody.innerHTML = "<tr><td colspan='14'>কোনো ডাটা নেই</td></tr>";
        return;
    }
    tbody.innerHTML = filtered.map((row, idx) => `
        <tr>
            <td>${idx+1}</td>
            <td>${row[0] || ''}</td><td>${row[1] || ''}</td><td>${row[2] || ''}</td>
            <td>${row[3] || ''}</td><td>${row[4] || ''}</td><td>${row[5] || ''}</td>
            <td>${row[6] || ''}</td><td>${row[7] || ''}</td><td>${row[8] || ''}</td>
            <td>${row[9] || ''}</td><td>${row[10] || ''}</td><td>${row[11] || ''}</td>
            <td class="no-print">
                <div class="action-btns">
                    <button class="btn btn-warning" onclick="editRow(${allData.indexOf(row)})">এডিট</button>
                    <button class="btn btn-danger" onclick="deleteRow(${allData.indexOf(row)})">ডিলিট</button>
                </div>
            </td>
        </tr>
    `).join('');
}

// যোগ/এডিট মডাল
function openAddModal() { currentEditIndex = -1; document.getElementById("modalTitle").innerText = "নতুন নাম যোগ করুন"; clearModalForm(); openModal(); }
function editRow(idx) { currentEditIndex = idx; let row = allData[idx]; document.getElementById("modalTitle").innerText = "এডিট করুন"; fillModalForm(row); openModal(); }
function deleteRow(idx) { if(confirm("ডাটা ডিলিট করবেন?")) { allData.splice(idx,1); saveAllDataToSheet(); } }
function saveData() { /* ডাটা সেভের জন্য কাস্টম লজিক */ showMessage("সংরক্ষিত!", "success"); closeModal(); loadData(); }

// ইউটিলিটি
function openModal() { document.getElementById("editModal").style.display = "flex"; }
function closeModal() { document.getElementById("editModal").style.display = "none"; }
function clearModalForm() { /* রিসেট ফর্ম */ }
function fillModalForm(row) { /* ফর্ম পূরণ */ }
function showMessage(msg, type) { let el = document.getElementById("statusMsg"); el.innerText = msg; el.className = "status-msg status-"+type; setTimeout(()=> el.style.display="none", 3000); }
function refreshData() { loadData(); }
function exportToCSV() { /* CSV ফাংশন */ alert("CSV তৈরির কাজ চলছে"); }
function saveAllDataToSheet() { /* ব্যাকএন্ডে সেভ */ alert("সেভের কাজ চলছে"); }

// পেজ লোডে
loadData();
</script>
</body>
</html>
