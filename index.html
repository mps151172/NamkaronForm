<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>জয় গুরু - নামকরণ ফর্ম</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f0e6 0%, #e8dccc 100%);
            font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid #e9d6a3;
        }
        .header {
            background: linear-gradient(95deg, #8b5a2b, #c97e2c);
            padding: 25px 20px;
            text-align: center;
            color: #ffefc0;
            border-bottom: 4px solid #f3c26b;
        }
        .header h1 { font-size: 2rem; letter-spacing: 2px; }
        .header p { font-size: 0.9rem; margin-top: 5px; }
        .form-body { padding: 28px 25px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label {
            font-weight: 700; color: #4d2e10; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
            border-right: 3px solid #e6bc6a; padding-right: 12px;
            width: fit-content;
        }
        input, select {
            padding: 12px 16px; font-size: 1rem; font-family: inherit;
            border: 1px solid #ddcca5; border-radius: 28px;
            background: #fefaf0; transition: 0.2s; outline: none;
        }
        input:focus, select:focus {
            border-color: #c97e2c; box-shadow: 0 0 0 3px rgba(201,126,44,0.2);
            background: #fff;
        }
        .gender-group { display: flex; gap: 25px; align-items: center; flex-wrap: wrap; padding: 5px 0; }
        .gender-group label { border-right: none; font-weight: normal; gap: 6px; }
        .row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .submit-btn {
            background: #8b5a2b; color: #fff0c0; border: none;
            padding: 14px 28px; font-size: 1.2rem; font-weight: bold;
            border-radius: 40px; cursor: pointer; width: 100%;
            margin-top: 10px; transition: 0.2s;
        }
        .submit-btn:hover { background: #b96f20; transform: scale(0.98); }
        .note {
            background: #fef1db; padding: 12px; border-radius: 28px;
            text-align: center; margin-top: 15px; color: #6b4c24;
        }
        #message {
            text-align: center; margin-top: 15px; padding: 10px;
            border-radius: 28px; font-weight: bold;
        }
        @media (max-width: 560px) { .row-2col { grid-template-columns: 1fr; } .form-body { padding: 20px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🕉 জয় গুরু 🕉</h1>
        <p>ছেলে ও মেয়ের নামকরণের পবিত্র ফর্ম</p>
    </div>
    <div class="form-body">
        <form id="namkaranForm">
            <div class="form-group"><label>👨 পিতার নাম</label><input type="text" id="pita_nam" placeholder="পূর্ণ নাম" required></div>
            <div class="form-group"><label>👩 মাতার নাম</label><input type="text" id="mata_nam" placeholder="পূর্ণ নাম" required></div>
            <div class="form-group"><label>🧓 পিতামহ (দাদা)</label><input type="text" id="pitamaha" placeholder="পিতামহের নাম" required></div>
            <div class="form-group"><label>👴 প্রপিতামহ (ঠাকুরদাদা)</label><input type="text" id="prapitamaha" placeholder="প্রপিতামহের নাম" required></div>
            
            <div class="row-2col">
                <div class="form-group"><label>📅 জন্ম তারিখ</label><input type="date" id="janma_tarikh" required></div>
                <div class="form-group"><label>⏰ জন্ম সময়</label><input type="time" id="janma_somoy" required></div>
            </div>
            
            <div class="form-group">
                <label>⚥ সন্তানের লিঙ্গ</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="ছেলে" required> ছেলে</label>
                    <label><input type="radio" name="gender" value="মেয়ে" required> মেয়ে</label>
                    <label><input type="radio" name="gender" value="অন্যান্য" required> অন্যান্য</label>
                </div>
            </div>
            
            <div class="form-group"><label>🏠 গ্রাম / মহল্লা</label><input type="text" id="gram" placeholder="গ্রাম ও রাস্তার নাম" required></div>
            
            <div class="row-2col">
                <div class="form-group"><label>🗺️ জেলা</label><select id="jela" required><option value="">-- জেলা নির্বাচন করুন --</option></select></div>
                <div class="form-group"><label>📍 উপজেলা / থানা</label><select id="upazila" required disabled><option value="">প্রথমে জেলা বাছুন</option></select></div>
            </div>
            
            <div class="note">✨ জয় গুরু মন্ত্রের মাধ্যমে সন্তানের কল্যাণ কামনা করছি ✨</div>
            <button type="submit" class="submit-btn">🔱 নামকরণ ফর্ম জমা দিন 🔱</button>
        </form>
        <div id="message"></div>
    </div>
</div>

<script>
// ==================================================
// বাংলাদেশের জেলা ও উপজেলার তথ্য
// ==================================================
const districtToUpazila = {

    "কুমিল্লা": ["কুমিল্লা সদর", "চান্দিনা", "বরুড়া", "দাউদকান্দি", "লাকসাম", "মুরাদনগর", "দেবিদ্বার", "ব্রাহ্মণপাড়া", "মনোহরগঞ্জ", "তিতাস", "নাঙ্গলকোট", "মেঘনা", "হোমনা"],
    "ফেনী": ["ফেনী সদর", "ছাগলনাইয়া", "পরশুরাম", "দাগনভূঞা", "সোনাগাজী"],
    "নোয়াখালী": ["নোয়াখালী সদর", "সুবর্ণচর", "কোম্পানীগঞ্জ", "বেগমগঞ্জ", "সেনবাগ", "চাটখিল", "সোনাইমুড়ি", "হাতিয়া", "কবিরহাট"],
    "কক্সবাজার": ["কক্সবাজার সদর", "চকোরিয়া", "কুতুবদিয়া", "ঈদগাঁও", "মহেশখালী", "রামু", "উখিয়া", "টেকনাফ", "পেকুয়া"],
    "নওগাঁ": ["নওগাঁ সদর", "রাণীনগর", "পত্নীতলা", "ধামইরহাট", "মহাদেবপুর", "বদলগাছি", "মান্দা", "নিয়ামতপুর", "আত্রাই", "সাপাহার", "পোরশা"],

    "পাবনা": ["পাবনা সদর", "বেড়া", "চাটমোহর", "ভাঙ্গুরা", "ফরিদপুর", "ঈশ্বরদী", "সাঁথিয়া", "সুজানগর", "আটঘরিয়া", "আমিনপুর"],

    "কুষ্টিয়া": ["কুষ্টিয়া সদর", "কুমারখালী", "খোকসা", "মিরপুর", "দৌলতপুর", "ভেড়ামারা"],
    "যশোর": ["যশোর সদর", "অভয়নগর", "বাঘারপাড়া", "চৌগাছা", "ঝিকরগাছা", "কেশবপুর", "মনিরামপুর", "শার্শা"],
    "সাতক্ষীরা": ["সাতক্ষীরা সদর", "আশাশুনি", "কলারোয়া", "তালা", "দেবহাটা", "শ্যামনগর", "কালীগঞ্জ", "পাটকেলঘাটা"],
    "গাজীপুর": ["গাজীপুর সদর", "কালিয়াকৈর", "কাপাসিয়া", "শ্রীপুর", "কালীগঞ্জ", "টঙ্গী"],
    "নারায়ণগঞ্জ": ["নারায়ণগঞ্জ সদর", "বন্দর", "সোনারগাঁও", "রূপগঞ্জ", "আড়াইহাজার", "ফতুল্লা"],

    "কিশোরগঞ্জ": ["কিশোরগঞ্জ সদর", "অষ্টগ্রাম", "ইটনা", "করিমগঞ্জ", "কটিয়াদী", "তাড়াইল", "পাকুন্দিয়া", "বাজিতপুর", "ভৈরব", "মিঠামইন", "হোসেনপুর", "নিকলী"],

};

// জেলার ড্রপডাউন পপুলেট
const jelaSelect = document.getElementById("jela");
const upazilaSelect = document.getElementById("upazila");

for (let jela in districtToUpazila) {
    let option = document.createElement("option");
    option.value = jela;
    option.textContent = jela;
    jelaSelect.appendChild(option);
}

jelaSelect.addEventListener("change", function() {
    let selectedJela = this.value;
    upazilaSelect.innerHTML = '<option value="">-- উপজেলা নির্বাচন করুন --</option>';
    if (selectedJela && districtToUpazila[selectedJela]) {
        upazilaSelect.disabled = false;
        districtToUpazila[selectedJela].forEach(upazila => {
            let option = document.createElement("option");
            option.value = upazila;
            option.textContent = upazila;
            upazilaSelect.appendChild(option);
        });
    } else {
        upazilaSelect.disabled = true;
    }
});

// ==================================================
// আপনার Google Apps Script URL (যেটা ব্রাউজারে দেখেছেন)
// ==================================================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLvckTTSRLOBWfZnKKFE-dW3bqwUrF-D49TD1LPQY/exec";

const form = document.getElementById("namkaranForm");
const msgDiv = document.getElementById("message");

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    
    // লিঙ্গের মান সংগ্রহ
    let gender = "";
    document.querySelectorAll('input[name="gender"]').forEach(radio => {
        if (radio.checked) gender = radio.value;
    });
    
    // ফর্মের সব ডাটা সংগ্রহ
    const formData = {
        pita_nam: document.getElementById("pita_nam").value,
        mata_nam: document.getElementById("mata_nam").value,
        pitamaha: document.getElementById("pitamaha").value,
        prapitamaha: document.getElementById("prapitamaha").value,
        janma_tarikh: document.getElementById("janma_tarikh").value,
        janma_somoy: document.getElementById("janma_somoy").value,
        linga: gender,
        gram: document.getElementById("gram").value,
        jela: document.getElementById("jela").value,
        upazila: document.getElementById("upazila").value
    };
    
    // সব ফিল্ড পূর্ণ কিনা চেক
    for (let key in formData) {
        if (!formData[key]) {
            msgDiv.innerHTML = "⚠️ সব তথ্য পূরণ করুন!";
            msgDiv.style.color = "red";
            msgDiv.style.background = "#ffe0e0";
            return;
        }
    }
    
    msgDiv.innerHTML = "⏳ জমা হচ্ছে, দয়া করে অপেক্ষা করুন...";
    msgDiv.style.color = "#c97e2c";
    msgDiv.style.background = "#fff0d0";
    
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        });
        
        msgDiv.innerHTML = "✅ জয় গুরু! আপনার তথ্য সফলভাবে জমা হয়েছে।";
        msgDiv.style.color = "green";
        msgDiv.style.background = "#d0ffd0";
        
        // ফর্ম রিসেট
        form.reset();
        upazilaSelect.innerHTML = '<option value="">-- উপজেলা নির্বাচন করুন --</option>';
        upazilaSelect.disabled = true;
        
        // ৫ সেকেন্ড পর মেসেজ মুছে ফেলা
        setTimeout(() => {
            msgDiv.innerHTML = "";
            msgDiv.style.background = "transparent";
        }, 5000);
        
    } catch(error) {
        msgDiv.innerHTML = "❌ নেটওয়ার্ক সমস্যা! আবার চেষ্টা করুন।";
        msgDiv.style.color = "red";
        msgDiv.style.background = "#ffe0e0";
        console.error("Error:", error);
    }
});
</script>
</body>
</html>
