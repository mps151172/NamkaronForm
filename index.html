<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>জয় গুরু - সম্পূর্ণ নামকরণ ফর্ম (সব জেলা ও উপজেলা)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f0e6 0%, #e8dccc 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans Bengali', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid #e9d6a3;
        }
        .header {
            background: linear-gradient(95deg, #8b5a2b, #c97e2c);
            padding: 25px 20px;
            text-align: center;
            color: #ffefc0;
            border-bottom: 4px solid #f3c26b;
        }
        .header h1 { font-size: 2rem; letter-spacing: 2px; text-shadow: 2px 2px 0 #5a3a1a; }
        .header p { font-size: 0.95rem; margin-top: 6px; font-style: italic; }
        .form-body { padding: 28px 25px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label {
            font-weight: 700; color: #4d2e10; margin-bottom: 6px; font-size: 0.95rem;
            display: flex; align-items: center; gap: 6px; border-right: 3px solid #e6bc6a;
            padding-right: 10px; width: fit-content;
        }
        input, select, textarea {
            padding: 10px 14px; font-size: 0.95rem; font-family: inherit;
            border: 1px solid #ddcca5; border-radius: 24px; background: #fefaf0;
            transition: 0.2s; outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #c97e2c; box-shadow: 0 0 0 3px rgba(201,126,44,0.2); background: #fff;
        }
        .gender-group { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; padding: 5px 0; }
        .gender-group label { font-weight: normal; border-right: none; gap: 5px; }
        .row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .submit-btn {
            background: #8b5a2b; color: #fff0c0; border: none; padding: 12px 24px;
            font-size: 1.1rem; font-weight: bold; border-radius: 40px; cursor: pointer;
            width: 100%; margin-top: 15px; transition: 0.2s;
        }
        .submit-btn:hover { background: #b96f20; transform: scale(0.98); }
        .note { background: #fef1db; padding: 10px; border-radius: 28px; font-size: 0.8rem; text-align: center; margin-top: 15px; color: #6b4c24; }
        @media (max-width: 560px) { .row-2col { grid-template-columns: 1fr; } .form-body { padding: 18px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🕉 জয় গুরু 🕉</h1>
        <p>ছেলে ও মেয়ের নামকরণের পবিত্র ফর্ম (সম্পূর্ণ জেলা ও উপজেলা সহ)</p>
    </div>
    <div class="form-body">
        <form id="namkaranForm">
            <div class="form-group"><label>👨 পিতার নাম</label><input type="text" placeholder="পূর্ণ নাম" required></div>
            <div class="form-group"><label>👩 মাতার নাম</label><input type="text" placeholder="পূর্ণ নাম" required></div>
            <div class="form-group"><label>🧓 পিতামহ (দাদা)</label><input type="text" placeholder="পিতামহের নাম" required></div>
            <div class="form-group"><label>👴 প্রপিতামহ (ঠাকুরদাদা)</label><input type="text" placeholder="প্রপিতামহের নাম" required></div>
            
            <div class="row-2col">
                <div class="form-group"><label>📅 সন্তানের জন্ম তারিখ</label><input type="date" required></div>
                <div class="form-group"><label>⏰ সন্তানের জন্ম সময়</label><input type="time" required></div>
            </div>
            
            <div class="form-group">
                <label>⚥ সন্তানের লিঙ্গ</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="ছেলে" required> ছেলে</label>
                    <label><input type="radio" name="gender" value="মেয়ে" required> মেয়ে</label>
                    <label><input type="radio" name="gender" value="অন্যান্য" required> অন্যান্য</label>
                </div>
            </div>
            
            <div class="form-group"><label>🏠 গ্রাম / মহল্লা</label><input type="text" placeholder="গ্রাম, রোড, বাড়ি নং" required></div>
            
            <div class="row-2col">
                <div class="form-group"><label>🗺️ জেলা</label><select id="districtSelect" required><option value="">-- জেলা নির্বাচন করুন --</option></select></div>
                <div class="form-group"><label>📍 উপজেলা / থানা</label><select id="upazilaSelect" required disabled><option value="">প্রথমে জেলা বাছুন</option></select></div>
            </div>
            
            <div class="note">✨ জয় গুরু মন্ত্রের মাধ্যমে সন্তানের জন্য কল্যাণ কামনা করছি ✨</div>
            <button type="submit" class="submit-btn">🔱 নামকরণ ফর্ম জমা দিন 🔱</button>
        </form>
    </div>
</div>

// সমস্ত জেলাকে একটা ফ্ল্যাট তালিকায় নিয়ে আসা (বিভাগ ছাড়াই সাজানো)
const allDistrictsFlat = [];
const districtToUpazila = {};

for (let division in allDistrictsWithUpazilas) {
    const districts = allDistrictsWithUpazilas[division];
    for (let district in districts) {
        allDistrictsFlat.push(district);
        districtToUpazila[district] = districts[district];
    }
}
allDistrictsFlat.sort();

// জেলার ড্রপডাউন পপুলেট
const districtSelect = document.getElementById("districtSelect");
const upazilaSelect = document.getElementById("upazilaSelect");

function loadDistricts() {
    for (let district of allDistrictsFlat) {
        const option = document.createElement("option");
        option.value = district;
        option.textContent = district;
        districtSelect.appendChild(option);
    }
}

function loadUpazilas(selectedDistrict) {
    upazilaSelect.innerHTML = '<option value="">-- উপজেলা নির্বাচন করুন --</option>';
    if (!selectedDistrict || !districtToUpazila[selectedDistrict]) {
        upazilaSelect.disabled = true;
        upazilaSelect.innerHTML = '<option value="">প্রথমে জেলা বাছুন</option>';
        return;
    }
    const upazilas = districtToUpazila[selectedDistrict];
    upazilaSelect.disabled = false;
    for (let upazila of upazilas) {
        const option = document.createElement("option");
        option.value = upazila;
        option.textContent = upazila;
        upazilaSelect.appendChild(option);
    }
}

districtSelect.addEventListener("change", function(e) {
    loadUpazilas(e.target.value);
});

const form = document.getElementById("namkaranForm");
form.addEventListener("submit", function(e) {
    e.preventDefault();
    alert("🪔 জয় গুরু! আপনার নামকরণ ফর্ম গ্রহণ করা হয়েছে। শুভ কামনা রইল। 🪔");
});

loadDistricts();
upazilaSelect.disabled = true;
</script>
