<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>জয় গুরু - নামকরণ ফর্ম | অনুকূল ঠাকুর</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(145deg, #fef5e8 0%, #f0e6d2 100%);
            font-family: 'Hind Siliguri', 'Segoe UI', 'Noto Sans Bengali', sans-serif;
            padding: 16px 12px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .hero-section {
            background: linear-gradient(115deg, #1a3c2c 0%, #2a5a3a 50%, #3d7a4a 100%);
            padding: 24px 16px 20px 16px;
            text-align: center;
        }
        
        .thakur-image {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #ffd966;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            margin: 0 auto 12px auto;
            background: radial-gradient(circle, #fff5e0, #f0d89a);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .thakur-image span {
            font-size: 44px;
        }
        
        .hero-section h1 {
            font-size: 1.6rem;
            color: #ffefc0;
            font-weight: 600;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        
        .hero-section h1 span {
            display: inline-block;
            animation: gentlePulse 2s infinite;
        }
        
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 8px #ffd700; }
        }
        
        .hero-section p {
            color: #e6d5b3;
            margin-top: 6px;
            font-size: 0.85rem;
        }
        
        .verse {
            background: rgba(255,235,190,0.2);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-top: 10px;
            font-size: 0.85rem;
            font-style: italic;
            font-weight: 500;
            color: #fff0c0;
        }
        
        .form-body {
            padding: 24px 20px;
            background: #fffef9;
        }
        
        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #2c5a2e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #f3f8ea, #fffbf0);
            padding: 5px 14px;
            border-radius: 40px;
            width: fit-content;
            border-left: 3px solid #d4a373;
        }
        
        input, select {
            padding: 14px 16px;
            font-size: 1rem;
            font-family: 'Hind Siliguri', monospace;
            border: 1.5px solid #e2d4ba;
            border-radius: 30px;
            background: #ffffff;
            transition: all 0.25s ease;
            outline: none;
            color: #3b2a1a;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus, select:focus {
            border-color: #d48c2c;
            box-shadow: 0 0 0 3px rgba(212, 140, 44, 0.15);
            background: #fffdf8;
        }
        
        input::placeholder {
            color: #bbaa84;
            font-weight: 400;
            font-size: 0.85rem;
        }
        
        .gender-group {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            background: #fefaf0;
            padding: 10px 18px;
            border-radius: 50px;
            margin-top: 5px;
        }
        
        .gender-group label {
            border-left: none;
            background: none;
            padding: 6px 0;
            margin: 0;
            gap: 8px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .gender-group input {
            width: 18px;
            height: 18px;
            accent-color: #2a7a3a;
            margin: 0;
        }
        
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        
        .submit-btn {
            background: linear-gradient(95deg, #2a5a3a, #3d8a4a);
            color: #fff6e5;
            border: none;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.2s;
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(42, 90, 58, 0.3);
        }
        
        .submit-btn:active {
            transform: scale(0.97);
        }
        
        .note {
            background: #f6f2e0;
            padding: 14px;
            border-radius: 32px;
            text-align: center;
            margin-top: 22px;
            color: #4a6a2a;
            font-size: 0.85rem;
            border: 1px solid #e8dbbd;
            font-weight: 500;
            line-height: 1.5;
        }
        
        .prayer {
            background: #e8f0e0;
            padding: 12px;
            border-radius: 28px;
            margin-top: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: #2c5a2e;
            border-left: 4px solid #d4a373;
            font-style: italic;
        }
        
        #message {
            text-align: center;
            margin-top: 18px;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .error { background: #ffe6e5; color: #c23d2e; border-left: 5px solid #c23d2e; }
        .success { background: #e0f5e5; color: #2d6a4f; border-left: 5px solid #2d6a4f; }
        .loading { background: #fff0d0; color: #c97e2c; border-left: 5px solid #c97e2c; }
        
        small { font-size: 0.7rem; color: #8a7a5a; margin-left: 12px; margin-top: 4px; }
        
        @media (max-width: 560px) {
            body { padding: 12px 10px; }
            .row-2col { grid-template-columns: 1fr; gap: 12px; }
            .form-body { padding: 20px 16px; }
            .hero-section h1 { font-size: 1.4rem; }
            .thakur-image { width: 70px; height: 70px; }
            .thakur-image span { font-size: 36px; }
            .gender-group { gap: 18px; padding: 8px 14px; }
            .submit-btn { padding: 14px 16px; font-size: 1.1rem; }
        }
        
        @media (max-width: 380px) {
            .gender-group { gap: 12px; flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero-section">
        <div class="thakur-image">
            <span>🙏</span>
        </div>
        <h1>🕉 <span>জয় গুরু</span> 🕉</h1>
        <p>শ্রীশ্রী অনুকূল ঠাকুরের পবিত্র আশীর্বাদে</p>
        <div class="verse">“সত্য, শিব, সুন্দর - সবার মঙ্গল করো”</div>
    </div>
    <div class="form-body">
        <form id="namkaranForm">
            <div class="row-2col">
                <div class="form-group">
                    <label>👨 পিতার নাম</label>
                    <input type="text" id="pita_nam" placeholder="পূর্ণ নাম" required>
                </div>
                <div class="form-group">
                    <label>👩 মাতার নাম</label>
                    <input type="text" id="mata_nam" placeholder="পূর্ণ নাম" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>📞 মোবাইল নাম্বার</label>
                <input type="tel" id="mobile" placeholder="01XXXXXXXXX" pattern="[0-9]{11}" inputmode="numeric" required>
                <small>যেকোনো একটি অভিভাবকের মোবাইল নাম্বার দিন</small>
            </div>
            
            <div class="row-2col">
                <div class="form-group">
                    <label>🧓 পিতামহ (দাদা)</label>
                    <input type="text" id="pitamaha" placeholder="পিতামহের নাম" required>
                </div>
                <div class="form-group">
                    <label>👴 প্রপিতামহ (ঠাকুরদাদা)</label>
                    <input type="text" id="prapitamaha" placeholder="প্রপিতামহের নাম" required>
                </div>
            </div>
            
            <div class="row-2col">
                <div class="form-group">
                    <label>📅 জন্ম তারিখ</label>
                    <input type="date" id="janma_tarikh" required>
                </div>
                <div class="form-group">
                    <label>⏰ জন্ম সময়</label>
                    <input type="time" id="janma_somoy" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>⚥ সন্তানের লিঙ্গ</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="ছেলে" required> ছেলে</label>
                    <label><input type="radio" name="gender" value="মেয়ে" required> মেয়ে</label>
                    <label><input type="radio" name="gender" value="অন্যান্য" required> অন্যান্য</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>🏠 গ্রাম / মহল্লা</label>
                <input type="text" id="gram" placeholder="গ্রাম, রাস্তা, বাড়ির বিবরণ" required>
            </div>
            
            <div class="row-2col">
                <div class="form-group">
                    <label>🗺️ জেলা</label>
                    <select id="jela" required>
                        <option value="">-- জেলা নির্বাচন করুন --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📍 উপজেলা</label>
                    <select id="upazila" required disabled>
                        <option value="">প্রথমে জেলা বাছুন</option>
                    </select>
                </div>
            </div>
            
            <div class="note">
                ✿ অনুকূল ঠাকুরের চরণে সন্তানের সুন্দর ও কল্যাণময় নামের জন্য প্রার্থনা ✿
            </div>
            
            <div class="prayer">
                🙏 “সত্য, শিব, সুন্দর - সবার মঙ্গল করো” 🙏
            </div>
            
            <button type="submit" class="submit-btn">
                <span>🔱</span> নামকরণ জমা দিন <span>🔱</span>
            </button>
        </form>
        <div id="message"></div>
    </div>
</div>

// জেলা ড্রপডাউন পপুলেট (সাজানো)
const jelaSelect = document.getElementById("jela");
const upazilaSelect = document.getElementById("upazila");

const sortedDistricts = Object.keys(districtToUpazila).sort();
for (let jela of sortedDistricts) {
    let option = new Option(jela, jela);
    jelaSelect.appendChild(option);
}

jelaSelect.addEventListener("change", function() {
    let selectedJela = this.value;
    upazilaSelect.innerHTML = '<option value="">-- উপজেলা নির্বাচন করুন --</option>';
    if (selectedJela && districtToUpazila[selectedJela]) {
        upazilaSelect.disabled = false;
        let sortedUpazilas = [...districtToUpazila[selectedJela]].sort();
        sortedUpazilas.forEach(up => {
            upazilaSelect.appendChild(new Option(up, up));
        });
    } else {
        upazilaSelect.disabled = true;
    }
});

// ✅ আপনার নতুন Google Apps Script URL
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEOkpjuI9-BNZgHl8Lz-sV5eFjqnBVV2pifyXvOwgvvchMrFWSFCgg0C61QvmO5dqo/exec";

const form = document.getElementById("namkaranForm");
const msgDiv = document.getElementById("message");

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    
    let gender = "";
    document.querySelectorAll('input[name="gender"]').forEach(radio => {
        if (radio.checked) gender = radio.value;
    });
    
    const formData = {
        pita_nam: document.getElementById("pita_nam").value.trim(),
        mata_nam: document.getElementById("mata_nam").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        pitamaha: document.getElementById("pitamaha").value.trim(),
        prapitamaha: document.getElementById("prapitamaha").value.trim(),
        janma_tarikh: document.getElementById("janma_tarikh").value,
        janma_somoy: document.getElementById("janma_somoy").value,
        linga: gender,
        gram: document.getElementById("gram").value.trim(),
        jela: document.getElementById("jela").value,
        upazila: document.getElementById("upazila").value
    };
    
    for (let key in formData) {
        if (!formData[key]) {
            msgDiv.innerHTML = "⚠️ সব তথ্য পূরণ করুন! (জেলা ও উপজেলা নির্বাচন করুন)";
            msgDiv.className = "error";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        }
    }
    
    msgDiv.innerHTML = "⏳ জমা হচ্ছে... 🙏";
    msgDiv.className = "loading";
    
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        });
        
        msgDiv.innerHTML = "✅ জয় গুরু! তথ্য সেভ হয়েছে। অনুকূল ঠাকুরের আশীর্বাদ রইলো।";
        msgDiv.className = "success";
        
        form.reset();
        upazilaSelect.innerHTML = '<option value="">-- উপজেলা নির্বাচন করুন --</option>';
        upazilaSelect.disabled = true;
        
        setTimeout(() => {
            msgDiv.innerHTML = "";
            msgDiv.className = "";
        }, 5000);
    } catch(error) {
        msgDiv.innerHTML = "❌ সংযোগ সমস্যা! আবার চেষ্টা করুন।";
        msgDiv.className = "error";
        console.error("Submit Error:", error);
    }
});
</script>
